name: snapshot ONPE

# Dispara: manual (para pruebas) y cron comentado (activar cuando funcione)
on:
  workflow_dispatch:
    inputs:
      incluir_distritos:
        description: 'Incluir nivel distrito (más lento ~5min vs ~30s)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  # DESCOMENTAR CUANDO YA SEPAS QUE FUNCIONA:
  # schedule:
  #   - cron: '*/30 * * * *'  # cada 30 minutos (hora UTC)

permissions:
  contents: write  # necesario para que pueda pushear el snapshot

concurrency:
  group: snapshot-onpe
  cancel-in-progress: false  # no cancelar el anterior si aún está corriendo

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/snapshot.yml') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow requests

      - name: Run scraper
        env:
          INCLUIR_DIST: ${{ github.event.inputs.incluir_distritos || 'false' }}
        run: |
          set -e
          echo "incluir distritos: $INCLUIR_DIST"
          if [ "$INCLUIR_DIST" = "true" ]; then
            python onpe_2026_scraper_v3.py --out ./_scraper_out
          else
            python onpe_2026_scraper_v3.py --out ./_scraper_out --no-distrito
          fi
          # encontrar el snapshot recién creado
          SNAP_DIR=$(ls -td ./_scraper_out/snapshot_* | head -1)
          echo "snapshot dir: $SNAP_DIR"
          echo "SNAP_DIR=$SNAP_DIR" >> $GITHUB_ENV

      - name: Build JSON
        env:
          SNAP_DIR: ${{ env.SNAP_DIR }}
        run: |
          set -e
          python build_data.py "$SNAP_DIR" .
          echo "--- archivos onpe_data_*.json en repo raíz ---"
          ls -lh onpe_data_*.json | tail -5

      - name: Apply retention policy
        run: |
          python retention.py .

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # añadir solo los JSON de snapshots (ignorar carpeta _scraper_out)
          git add 'onpe_data_*.json' || true
          # si hay cambios (nuevo snapshot o retención borró algo), commitear
          if git diff --cached --quiet; then
            echo "sin cambios — el avance probablemente no cambió"
          else
            # extraer el avance del archivo más reciente para el mensaje
            LATEST=$(ls -t onpe_data_*.json | head -1)
            AVANCE=$(echo "$LATEST" | sed -E 's/.*_([0-9]+\.[0-9]+)pct\.json/\1/')
            TS_UTC=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "snapshot: ${AVANCE}% at ${TS_UTC}"
            git push
            echo "✓ push exitoso"
          fi

      - name: Cleanup scraper artifacts
        if: always()
        run: rm -rf ./_scraper_out
